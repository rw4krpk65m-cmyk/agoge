<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Work+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#14120f;
  --bg-elev:#1c1914;
  --bg-elev-2:#242019;
  --bg-elev-3:#2c2620;
  --line:#3a3327;
  --line-soft:#2a251d;
  --gold:#c19a5b;
  --gold-soft:#8a7048;
  --gold-glow:rgba(193,154,91,0.18);
  --cream:#ece4d3;
  --cream-dim:#a89b84;
  --cream-faint:#6f6555;
  --red:#9a4a3f;
  --green:#7a9a72;
  --radius:12px;
  --font-display:'Cinzel',serif;
  --font-body:'Work Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--cream);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  padding-bottom:76px;
}

::selection{background:var(--gold-glow);}

a{color:var(--gold);}

/* ---------- HEADER ---------- */
header.app-header{
  position:sticky; top:0; z-index:20;
  background:linear-gradient(180deg, var(--bg) 70%, rgba(20,18,15,0.85));
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line-soft);
  padding:14px 18px 12px;
}
.brand-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
.brand{
  font-family:var(--font-display);
  font-weight:700;
  letter-spacing:0.12em;
  font-size:20px;
  color:var(--gold);
  text-transform:uppercase;
}
.brand-sub{
  font-size:11px;
  color:var(--cream-faint);
  letter-spacing:0.04em;
  margin-top:2px;
}
.week-strip{
  margin-top:10px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--cream-dim);
}
.week-strip b{color:var(--gold); font-weight:600;}

/* ---------- LAYOUT ---------- */
main{
  max-width:760px;
  margin:0 auto;
  padding:16px 16px 40px;
}
.tab-panel{display:none;}
.tab-panel.active{display:block; animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

section.block{margin-bottom:26px;}
h2.block-title{
  font-family:var(--font-display);
  font-size:15px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--cream);
  margin:0 0 10px;
  padding-bottom:8px;
  border-bottom:1px solid var(--line-soft);
}
p.block-sub{
  font-size:13px;
  color:var(--cream-dim);
  margin:-4px 0 14px;
  line-height:1.5;
}

/* ---------- NOTE BOX ---------- */
.note-box{
  background:var(--bg-elev-2);
  border-left:3px solid var(--gold);
  border-radius:6px;
  padding:12px 14px;
  margin-bottom:18px;
}
.note-box .note-title{
  font-weight:600; color:var(--gold); font-size:13px;
  margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;
}
.note-box ul{margin:0; padding-left:18px;}
.note-box li{font-size:13px; color:var(--cream-dim); line-height:1.55; margin-bottom:4px; font-style:italic;}

/* ---------- PLANNING TABLE ---------- */
table.plan-table{width:100%; border-collapse:collapse; font-size:13px; margin-bottom:8px;}
table.plan-table th{
  background:var(--bg-elev-3); color:var(--gold); text-align:left;
  padding:8px 10px; font-family:var(--font-mono); font-size:11px;
  text-transform:uppercase; letter-spacing:0.03em;
}
table.plan-table td{padding:8px 10px; border-bottom:1px solid var(--line-soft);}
table.plan-table tr:nth-child(even) td{background:rgba(193,154,91,0.05);}
.day-name{font-weight:600; color:var(--cream);}
.tag-rest{color:var(--cream-faint); font-style:italic;}

/* ---------- SESSION CARDS (accordion) ---------- */
details.session-card{
  background:var(--bg-elev);
  border:1px solid var(--line-soft);
  border-radius:var(--radius);
  margin-bottom:12px;
  overflow:hidden;
}
details.session-card > summary{
  list-style:none;
  cursor:pointer;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  -webkit-tap-highlight-color:transparent;
}
details.session-card > summary::-webkit-details-marker{display:none;}
.medallion{
  flex:0 0 auto;
  width:38px; height:38px;
  border:2px solid var(--gold-soft);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:15px;
  color:var(--gold);
  background:radial-gradient(circle at 35% 30%, var(--bg-elev-3), var(--bg-elev));
}
details[open] .medallion{border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-glow);}
.session-head-text{flex:1 1 auto; min-width:0;}
.session-head-title{font-family:var(--font-display); font-size:14px; letter-spacing:0.03em; color:var(--cream); text-transform:uppercase;}
.session-head-focus{font-size:12px; color:var(--cream-dim); margin-top:2px; line-height:1.4;}
.chevron{flex:0 0 auto; color:var(--cream-faint); transition:transform .2s ease;}
details[open] .chevron{transform:rotate(180deg); color:var(--gold);}
.badge-optional{
  display:inline-block; font-size:10px; font-family:var(--font-mono);
  color:var(--gold-soft); border:1px solid var(--line); border-radius:20px;
  padding:1px 8px; margin-left:6px; vertical-align:middle;
}

.session-body{padding:0 16px 16px;}

/* exercise table (programme) */
table.ex-table{width:100%; border-collapse:collapse; font-size:12.5px; margin-top:4px;}
table.ex-table th{
  text-align:left; color:var(--gold-soft); font-family:var(--font-mono);
  font-size:10.5px; text-transform:uppercase; letter-spacing:0.03em;
  padding:6px 8px; border-bottom:1px solid var(--line);
}
table.ex-table td{padding:9px 8px; border-bottom:1px solid var(--line-soft); vertical-align:top;}
table.ex-table td.ex-name{font-weight:600; color:var(--cream); width:34%;}
table.ex-table td.mono{font-family:var(--font-mono); color:var(--cream-dim); white-space:nowrap;}
table.ex-table td.ex-note{color:var(--cream-faint); font-style:italic; font-size:11.5px;}

/* ---------- GUIDE: exercise detail accordions ---------- */
details.ex-detail{
  border-top:1px solid var(--line-soft);
  padding:10px 2px;
}
details.ex-detail:first-child{border-top:none;}
details.ex-detail > summary{
  cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px;
  font-weight:600; font-size:13.5px; color:var(--cream);
}
details.ex-detail > summary::-webkit-details-marker{display:none;}
details.ex-detail > summary .chevron{width:14px; height:14px;}
.ex-detail-body{padding:10px 4px 4px 22px;}
.ex-meta{font-size:12px; color:var(--gold-soft); margin-bottom:6px;}
.ex-meta b{color:var(--gold);}
.ex-label{font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--cream-faint); margin:10px 0 4px; font-family:var(--font-mono);}
.ex-text{font-size:13px; color:var(--cream-dim); line-height:1.55; margin:0;}
ol.ex-steps{margin:0; padding-left:20px;}
ol.ex-steps li{font-size:13px; color:var(--cream-dim); line-height:1.55; margin-bottom:4px;}
ul.ex-mistakes{margin:0; padding-left:20px;}
ul.ex-mistakes li{font-size:13px; color:var(--cream-dim); line-height:1.55; margin-bottom:4px;}
.ex-variant{
  margin-top:8px; background:var(--bg-elev-2); border-radius:6px; padding:8px 10px;
  font-size:12.5px; color:var(--cream-dim); font-style:italic;
}
.ex-variant b{color:var(--gold); font-style:normal;}
.superset-label{
  font-size:11.5px; color:var(--cream-faint); font-style:italic; margin-bottom:2px;
}

/* ---------- REST DAY OPTIONS ---------- */
.rest-option{margin-bottom:16px;}
.rest-option h3{
  font-family:var(--font-display); font-size:13px; letter-spacing:0.03em;
  color:var(--gold); margin:0 0 6px; text-transform:uppercase;
}
.rest-option p{font-size:13px; color:var(--cream-dim); line-height:1.55; margin:0 0 4px;}
.rest-option ul{margin:4px 0 0; padding-left:18px;}
.rest-option li{font-size:13px; color:var(--cream-dim); line-height:1.5; margin-bottom:3px;}

/* ---------- SUIVI TAB ---------- */
.week-tabs{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:16px; -webkit-overflow-scrolling:touch;}
.week-tab-btn{
  flex:0 0 auto; font-family:var(--font-mono); font-size:12.5px;
  background:var(--bg-elev); color:var(--cream-dim); border:1px solid var(--line-soft);
  border-radius:20px; padding:7px 14px; cursor:pointer; white-space:nowrap;
}
.week-tab-btn.active{background:var(--gold-glow); border-color:var(--gold); color:var(--gold);}
.week-tab-add{
  flex:0 0 auto; border:1px dashed var(--line); background:transparent; color:var(--cream-faint);
  border-radius:20px; padding:7px 14px; cursor:pointer; font-size:12.5px;
}

.date-range{display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.date-range input[type=date]{flex:1 1 140px;}
.date-range span{color:var(--cream-faint); font-size:12px;}

input, select, textarea{
  background:var(--bg-elev-2); border:1px solid var(--line); color:var(--cream);
  border-radius:6px; padding:7px 9px; font-family:var(--font-body); font-size:13px;
  width:100%;
}
input:focus, select:focus, textarea:focus{outline:2px solid var(--gold-glow); border-color:var(--gold-soft);}
input[type=checkbox]{width:19px; height:19px; accent-color:var(--gold); cursor:pointer; margin:0;}

table.log-table{width:100%; border-collapse:collapse; font-size:12px; margin-bottom:4px;}
table.log-table th{
  color:var(--gold-soft); font-family:var(--font-mono); font-size:10px; text-transform:uppercase;
  text-align:left; padding:6px 6px; border-bottom:1px solid var(--line); letter-spacing:0.02em;
}
table.log-table td{padding:6px 5px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
table.log-table td.day-cell{font-weight:600; font-size:12.5px; color:var(--cream); width:15%;}
table.log-table td.seance-cell{font-size:11.5px; color:var(--cream-dim); width:19%;}
table.log-table td.check-cell{text-align:center; width:9%;}
table.log-table input[type=date]{font-size:11px; padding:5px 4px;}
table.log-table select{font-size:11px; padding:5px 4px;}
table.log-table input[type=text]{font-size:11px; padding:5px 4px;}

.session-log-table td.ex-name-cell{font-weight:600; color:var(--cream); font-size:12px; width:26%;}
.session-log-table input{font-size:11.5px; padding:5px 5px;}

.bilan-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
.field-label{display:block; font-size:11px; color:var(--cream-faint); text-transform:uppercase; letter-spacing:0.03em; margin-bottom:4px; font-family:var(--font-mono);}
.field{margin-bottom:0;}
textarea{min-height:60px; resize:vertical;}

.photo-zone{
  border:1.5px dashed var(--line); border-radius:var(--radius); min-height:180px;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  gap:8px; margin-bottom:14px; overflow:hidden; position:relative; background:var(--bg-elev-2);
}
.photo-zone img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
.photo-zone .photo-placeholder{color:var(--cream-faint); font-size:12.5px; text-align:center; padding:0 20px;}
.photo-zone .photo-placeholder svg{margin-bottom:6px; opacity:0.6;}
.photo-actions{position:relative; z-index:2; display:flex; gap:8px;}
.btn{
  font-family:var(--font-body); font-weight:600; font-size:12.5px; cursor:pointer;
  border-radius:20px; padding:8px 16px; border:1px solid var(--gold-soft);
  background:var(--bg-elev-3); color:var(--gold);
}
.btn.btn-danger{border-color:var(--red); color:var(--red); background:rgba(154,74,63,0.08);}
.btn.btn-ghost{border-color:var(--line); color:var(--cream-dim); background:transparent;}
.photo-zone.has-photo .photo-actions{
  position:absolute; bottom:10px; right:10px; z-index:2;
}
.photo-zone.has-photo .btn{background:rgba(20,18,15,0.75); backdrop-filter:blur(3px);}

.save-pill{
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--gold); color:#1c1914; font-family:var(--font-mono); font-size:11.5px;
  font-weight:600; padding:8px 16px; border-radius:20px; opacity:0; transition:all .25s ease;
  pointer-events:none; z-index:30; letter-spacing:0.03em;
}
.save-pill.show{opacity:1; transform:translateX(-50%) translateY(0);}

.subhead-row{display:flex; align-items:center; justify-content:space-between; margin:18px 0 8px;}
.subhead-row h3{font-family:var(--font-display); font-size:12.5px; letter-spacing:0.05em; color:var(--gold); text-transform:uppercase; margin:0;}

/* ---------- BOTTOM NAV ---------- */
nav.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:25;
  background:var(--bg-elev); border-top:1px solid var(--line-soft);
  display:flex; padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
nav.tabbar button{
  flex:1; background:none; border:none; color:var(--cream-faint);
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 4px; cursor:pointer; font-family:var(--font-body); font-size:10.5px;
  letter-spacing:0.03em; text-transform:uppercase;
}
nav.tabbar button.active{color:var(--gold);}
nav.tabbar button svg{width:20px; height:20px;}

/* ---------- DESKTOP ---------- */
@media (min-width:860px){
  body{padding-bottom:0; padding-left:200px;}
  header.app-header{padding-left:calc(200px + 24px);}
  .brand-row, .week-strip{max-width:760px; margin:0 auto;}
  main{padding:28px 24px 60px;}
  nav.tabbar{
    top:0; bottom:0; left:0; right:auto; width:200px;
    flex-direction:column; justify-content:flex-start; align-items:stretch;
    border-top:none; border-right:1px solid var(--line-soft); padding:24px 12px;
    gap:4px;
  }
  nav.tabbar button{
    flex-direction:row; justify-content:flex-start; gap:10px; padding:11px 12px;
    border-radius:8px; font-size:12px;
  }
  nav.tabbar button.active{background:var(--gold-glow);}
  .save-pill{left:calc(200px + 50%);}
}
</style>
</head>

function emptyDay(){ return { done:false, steps:false, date:"", ressenti:"", note:"" }; }

function stripTags(s){ return s.replace(/&amp;/g,"&"); }

function initFirebase(){
  if(firebaseConfig.apiKey === "REMPLACE_MOI"){ syncEnabled = false; return; }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    syncEnabled = true;
  }catch(e){ console.error("Erreur d'init Firebase", e); syncEnabled = false; }
}

function showSyncBanner(kind){
  const el = document.getElementById("sync-banner");
  if(!el) return;
  if(kind === "none"){
    el.textContent = "Synchro non configurée — les données restent uniquement sur cet appareil.";
    el.style.display = "block";
  } else if(kind === "offline"){
    el.textContent = "Synchro indisponible pour le moment — sauvegarde locale uniquement.";
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}

async function loadState(){
  // 1) cache local instantané (affichage rapide, aussi filet de sécurité)
  let hadLocalData = false;
  try{
    const raw = localStorage.getItem("agoge_weeks_v1");
    if(raw){
      const parsed = JSON.parse(raw);
      weeks = parsed.weeks || {};
      weekOrder = parsed.weekOrder || [];
      hadLocalData = weekOrder.length > 0;
    }
  }catch(e){ /* rien en local */ }

  // 2) si la synchro est configurée, on tente de lire la version en ligne (source de vérité)
  let remoteHadData = false;
  if(syncEnabled){
    try{
      const snap = await db.ref("agoge_weeks_v1").once("value");
      const val = snap.val();
      if(val && val.weeks && val.weekOrder && val.weekOrder.length){
        weeks = val.weeks;
        weekOrder = val.weekOrder;
        remoteHadData = true;
      }
      syncOk = true;
      showSyncBanner("ok");
    }catch(e){
      console.error("Erreur de lecture Firebase", e);
      syncOk = false;
      showSyncBanner("offline");
    }
  } else {
    showSyncBanner("none");
  }

  if(!weekOrder.length){
    weekOrder = [1,2,3,4];
    weekOrder.forEach(id=> weeks[id] = emptyWeek(id));
  }

  // migration : anciennes semaines sans sessionInstances (ancien format à table unique)
  weekOrder.forEach(id=>{
    const wk = weeks[id];
    if(!wk) return;
    if(!wk.sessionInstances || !wk.sessionInstances.length){
      if(wk.sessionLogs && wk.sessionLogs[1] && wk.sessionLogs[1].length){
        wk.sessionInstances = [{ id:1, date:"", log: wk.sessionLogs[1] }];
        wk.nextInstanceId = 2;
      } else {
        wk.sessionInstances = [emptyInstance(1)];
        wk.nextInstanceId = 2;
      }
      delete wk.sessionLogs;
    }
    if(wk.nextInstanceId === undefined){
      wk.nextInstanceId = Math.max(0, ...wk.sessionInstances.map(i=>i.id)) + 1;
    }
  });

  activeWeek = weekOrder[0];

  // 3) premier branchement de la synchro : si ce téléphone/ordi a déjà des données
  //    locales mais que le cloud est encore vide, on les envoie tout de suite
  //    pour ne pas risquer de les perdre au prochain appareil qui se connecte.
  if(syncEnabled && !remoteHadData && hadLocalData){
    try{ await db.ref("agoge_weeks_v1").set({weeks, weekOrder}); }
    catch(e){ console.error("Erreur d'envoi initial vers Firebase", e); }
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    // toujours écrire en local d'abord (rapide, fiable hors-ligne)
    try{ localStorage.setItem("agoge_weeks_v1", JSON.stringify({weeks, weekOrder})); }
    catch(e){ console.error("Erreur de sauvegarde locale", e); }

    if(syncEnabled){
      try{
        await db.ref("agoge_weeks_v1").set({weeks, weekOrder});
        syncOk = true;
        showSyncBanner("ok");
      }catch(e){
        console.error("Erreur de sauvegarde Firebase", e);
        syncOk = false;
        showSyncBanner("offline");
      }
    }
    flashSaved();
  }, 500);
}

function flashSaved(){
  const pill = document.getElementById("save-pill");
  pill.classList.add("show");
  clearTimeout(pill._t);
  pill._t = setTimeout(()=>pill.classList.remove("show"), 1200);
}

async function getPhoto(weekId){
  if(photoCache[weekId] !== undefined) return photoCache[weekId];
  let localValue = null;
  try{ localValue = localStorage.getItem("agoge_photo_"+weekId) || null; }catch(e){ /* rien en local */ }
  let value = localValue;
  if(syncEnabled){
    try{
      const snap = await db.ref("agoge_photos/"+weekId).once("value");
      const remote = snap.val();
      if(remote){
        value = remote;
      } else if(localValue){
        // le cloud n'a pas encore cette photo mais cet appareil oui : on l'envoie
        try{ await db.ref("agoge_photos/"+weekId).set(localValue); }
        catch(e){ console.error("Erreur d'envoi initial de la photo", e); }
      }
    }catch(e){ console.error("Erreur lecture photo Firebase", e); }
  }
  photoCache[weekId] = value;
  return value;
}

async function setPhoto(weekId, dataUrl){
  photoCache[weekId] = dataUrl;
  try{
    if(dataUrl){ localStorage.setItem("agoge_photo_"+weekId, dataUrl); }
    else{ localStorage.removeItem("agoge_photo_"+weekId); }
  }catch(e){ console.error("Erreur photo locale (image sûrement trop grande)", e); }

  if(syncEnabled){
    try{
      if(dataUrl){ await db.ref("agoge_photos/"+weekId).set(dataUrl); }
      else{ await db.ref("agoge_photos/"+weekId).remove(); }
      syncOk = true; showSyncBanner("ok");
    }catch(e){ console.error("Erreur photo Firebase", e); syncOk = false; showSyncBanner("offline"); }
  }
  flashSaved();
}

    return { exId: ex.id, name, charge:"", reps:"", ressenti:"", note:"" };
  });
  instance.log = rows;
  return rows;
}

    <div class="session-body">
      <div style="display:flex; align-items:center; gap:10px; margin:8px 0 12px;">
        <input type="date" data-kind="instmeta" data-instance="${idx}" data-field="date" value="${instance.date}" style="max-width:170px;">
        ${total>1?`<button class="btn btn-danger" data-kind="instdelete" data-instance="${idx}" style="margin-left:auto;">Supprimer</button>`:""}
      </div>
      <table class="log-table session-log-table">
        <thead><tr><th>Exercice</th><th>Charge</th><th>Reps</th><th>Ressenti</th><th>Note</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  </details>`;
}

function formatDateShort(iso){
  const parts = iso.split("-");
  if(parts.length!==3) return iso;
  return `${parts[2]}/${parts[1]}`;
}

function sessionInstancesHTML(w){
  const cards = w.sessionInstances.map((inst,idx)=>instanceCardHTML(w, inst, idx, w.sessionInstances.length)).join("");
  return `${cards}<button class="btn" id="add-instance-btn" style="width:100%; margin-top:8px;">+ Ajouter une séance faite cette semaine</button>`;
}
function escapeAttr(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }

async function bilanHTML(w){
  const photo = await getPhoto(w.id);
  const doneDays = DAY_KEYS.filter(d=>w.days[d].done);
  const stepsDays = DAY_KEYS.filter(d=>w.days[d].steps).length;
  const summaryText = doneDays.length
    ? `${doneDays.length} séance${doneDays.length>1?'s':''} cette semaine — ${doneDays.join(', ')}`
    : `Aucune séance cochée pour l'instant cette semaine`;
  return `
    <div class="note-box" style="margin-bottom:16px;">
      <div class="note-title">Résumé de la semaine</div>
      <p style="margin:0; font-size:13px; color:var(--cream-dim);">${summaryText}.<br>${stepsDays}/7 jours à 10 000 pas.</p>
    </div>
    <div class="photo-zone ${photo?'has-photo':''}" id="photo-zone">
      ${photo?`<img src="${photo}" alt="Photo semaine ${w.id}">`:`
        <div class="photo-placeholder">
          ${ICONS.camera}
          <div>Ajoute une photo de fin de semaine</div>
        </div>`}
      <div class="photo-actions">
        <label class="btn">${photo?'Remplacer':'Ajouter une photo'}<input type="file" accept="image/*" capture="environment" id="photo-input" style="display:none"></label>
        ${photo?'<button class="btn btn-danger" id="photo-remove">Retirer</button>':''}
      </div>
    </div>
    <div class="bilan-grid">
      <div class="field">
        <label class="field-label">Poids du corps (kg)</label>
        <input type="text" data-kind="bilan" data-field="poids" value="${escapeAttr(w.bilan.poids)}" placeholder="ex: 72">
      </div>
      <div class="field">
        <label class="field-label">Tour de taille (cm)</label>
        <input type="text" data-kind="bilan" data-field="taille" value="${escapeAttr(w.bilan.taille)}" placeholder="optionnel">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label class="field-label">Ce qui a bien fonctionné</label>
      <textarea data-kind="bilan" data-field="positif">${w.bilan.positif}</textarea>
    </div>
    <div class="field">
      <label class="field-label">Ce qu'il faut ajuster</label>
      <textarea data-kind="bilan" data-field="ajuster">${w.bilan.ajuster}</textarea>
    </div>
  `;
}

async function renderSuivi(){
  const el = document.getElementById("tab-suivi");
  const w = weeks[activeWeek];
  el.innerHTML = `
    ${weekTabsHTML()}
    <section class="block">
      <div class="date-range">
        <input type="date" id="week-start" value="${w.dateStart}">
        <span>au</span>
        <input type="date" id="week-end" value="${w.dateEnd}">
        <button class="btn btn-danger" id="delete-week-btn" style="margin-left:auto;">Supprimer cette semaine</button>
      </div>
      <h2 class="block-title">Vue de la semaine</h2>
      <p class="block-sub">Objectif 10 000 pas par jour, salle ou repos inclus.</p>
      ${dailyTableHTML(w)}
    </section>
    <section class="block">
      <h2 class="block-title">Détail des séances</h2>
      <p class="block-sub">Ajoute une carte à chaque fois que tu vas t'entraîner cette semaine.</p>
      ${sessionInstancesHTML(w)}
    </section>
    <section class="block">
      <h2 class="block-title">Bilan de fin de semaine</h2>
      <div id="bilan-zone">Chargement…</div>
    </section>
  `;
  document.getElementById("bilan-zone").innerHTML = await bilanHTML(w);
  bindSuiviEvents();
}

function bindSuiviEvents(){
  const panel = document.getElementById("tab-suivi");

  panel.querySelectorAll('.week-tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeWeek = parseInt(btn.dataset.week,10);
      renderSuivi();
      renderWeekStrip();
    });
  });
  const addBtn = document.getElementById('add-week-btn');
  if(addBtn){
    addBtn.addEventListener('click', ()=>{
      const nextId = Math.max(...weekOrder)+1;
      weekOrder.push(nextId);
      weeks[nextId] = emptyWeek(nextId);
      activeWeek = nextId;
      scheduleSave();
      renderSuivi();
      renderWeekStrip();
    });
  }

  const deleteBtn = document.getElementById('delete-week-btn');
  if(deleteBtn){
    deleteBtn.addEventListener('click', async ()=>{
      if(weekOrder.length <= 1){
        alert("Impossible de supprimer la dernière semaine restante.");
        return;
      }
      if(!confirm(`Supprimer définitivement la Semaine ${activeWeek} ? Cette action est irréversible.`)) return;
      const idx = weekOrder.indexOf(activeWeek);
      weekOrder.splice(idx, 1);
      delete weeks[activeWeek];
      delete photoCache[activeWeek];
      try{ localStorage.removeItem("agoge_photo_"+activeWeek); }catch(e){}
      if(syncEnabled){
        try{ await db.ref("agoge_photos/"+activeWeek).remove(); }catch(e){ console.error(e); }
      }
      activeWeek = weekOrder[Math.max(0, idx-1)];
      scheduleSave();
      renderSuivi();
      renderWeekStrip();
    });
  }

  const w = weeks[activeWeek];

  document.getElementById('week-start').addEventListener('change', e=>{ w.dateStart = e.target.value; scheduleSave(); });
  document.getElementById('week-end').addEventListener('change', e=>{ w.dateEnd = e.target.value; scheduleSave(); });

  panel.querySelectorAll('input[data-kind="day"], select[data-kind="day"]').forEach(inp=>{
    const evt = inp.type==='checkbox' ? 'change' : (inp.tagName==='SELECT' ? 'change' : 'input');
    inp.addEventListener(evt, e=>{
      const day = inp.dataset.day, field = inp.dataset.field;
      w.days[day][field] = inp.type==='checkbox' ? inp.checked : inp.value;
      scheduleSave();
      if(field==='done' || field==='steps'){ renderWeekStrip(); updateBilanSummary(w); }
    });
  });

  panel.querySelectorAll('input[data-kind="instlog"]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const instIdx = parseInt(inp.dataset.instance,10), rowIdx = parseInt(inp.dataset.idx,10), field = inp.dataset.field;
      w.sessionInstances[instIdx].log[rowIdx][field] = inp.value;
      scheduleSave();
    });
  });

  panel.querySelectorAll('input[data-kind="instmeta"]').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const instIdx = parseInt(inp.dataset.instance,10), field = inp.dataset.field;
      w.sessionInstances[instIdx][field] = inp.value;
      scheduleSave();
      renderSuivi();
    });
  });

  panel.querySelectorAll('button[data-kind="instdelete"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const instIdx = parseInt(btn.dataset.instance,10);
      if(w.sessionInstances.length<=1) return;
      if(!confirm("Supprimer cette séance de la semaine ?")) return;
      w.sessionInstances.splice(instIdx,1);
      scheduleSave();
      renderSuivi();
    });
  });

  const addInstanceBtn = document.getElementById('add-instance-btn');
  if(addInstanceBtn){
    addInstanceBtn.addEventListener('click', ()=>{
      w.sessionInstances.push(emptyInstance(w.nextInstanceId));
      w.nextInstanceId += 1;
      scheduleSave();
      renderSuivi();
    });
  }

  panel.querySelectorAll('[data-kind="bilan"]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      w.bilan[inp.dataset.field] = inp.value;
      scheduleSave();
    });
  });

  const photoInput = document.getElementById('photo-input');
  if(photoInput){
    photoInput.addEventListener('change', async e=>{
      const file = e.target.files[0];
      if(!file) return;
      const dataUrl = await resizeImage(file, 640, 0.72);
      await setPhoto(activeWeek, dataUrl);
      renderSuivi();
    });
  }
  const photoRemove = document.getElementById('photo-remove');
  if(photoRemove){
    photoRemove.addEventListener('click', async ()=>{
      await setPhoto(activeWeek, null);
      renderSuivi();
    });
  }
}

function resizeImage(file, maxWidth, quality){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxWidth){ h = Math.round(h * (maxWidth/w)); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function updateBilanSummary(w){
  const el = document.querySelector('#bilan-zone .note-box p');
  if(!el) return;
  const doneDays = DAY_KEYS.filter(d=>w.days[d].done);
  const stepsDays = DAY_KEYS.filter(d=>w.days[d].steps).length;
  const summaryText = doneDays.length
    ? `${doneDays.length} séance${doneDays.length>1?'s':''} cette semaine — ${doneDays.join(', ')}`
    : `Aucune séance cochée pour l'instant cette semaine`;
  el.innerHTML = `${summaryText}.<br>${stepsDays}/7 jours à 10 000 pas.`;
}

function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('nav.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  window.scrollTo({top:0, behavior:'instant'});
}

document.querySelectorAll('nav.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=> setTab(btn.dataset.tab));
});

async function init(){
  initFirebase();
  await loadState();
  renderProgramme();
  renderGuide();
  await renderSuivi();
  renderWeekStrip();
}
init();
